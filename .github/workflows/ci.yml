name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    name: Engine + API (pytest, ruff, mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies (locked)
        run: uv sync --frozen
      - name: Canonical + native tests
        run: uv run pytest
      - name: Lint
        run: uv run ruff check
      - name: Types (strict)
        run: uv run mypy

  web:
    name: Web UI (vitest, tsc, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install (locked)
        run: npm ci
      - name: Types (strict)
        run: npx tsc --noEmit
      - name: Component + form-model tests
        run: npm test
      - name: Production build
        run: npm run build
