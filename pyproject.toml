[project]
name = "icebergsim"
version = "2.0.0a1"
description = "ICEBERGSIM v2 — clinical trial simulator regenerated from the Phoenix specification"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.0",
    "scipy>=1.13",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
server = [
    "fastapi>=0.115",
    "uvicorn>=0.30",
]

[project.scripts]
icebergsim-server = "icebergsim_server.main:run"

[dependency-groups]
dev = [
    "pytest>=8",
    "hypothesis>=6",
    "ruff>=0.4",
    "mypy>=1.10",
    "types-PyYAML",
    "scipy-stubs",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "httpx2>=0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/icebergsim", "server/icebergsim_server"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers"
filterwarnings = ["error"]

[tool.ruff]
line-length = 100
src = ["src", "server", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "RET", "C4", "PL"]
ignore = [
    "PLR0913", # many-arguments: statistical formulas legitimately take many named params
    "PLR2004", # magic-value-comparison: numeric literals are the point of a stats engine
]

[tool.mypy]
strict = true
files = ["src", "server", "tests"]
