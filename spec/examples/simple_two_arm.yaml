schema_version: "icebergsim.trial.v2"
id: "simple_two_arm"
label: "Simple two-arm RCT: 20% vs 10% event risk"
mode: "individual_binary"
n_simulations: 5000
random_seed: 101
alpha: 0.05
arms:
  control:
    label: "Control"
    event_probability: 0.20
  intervention:
    label: "Intervention"
    event_probability: 0.10
allocation:
  total_n: 400
  intervention_fraction: 0.5
untreated_event_probability: 0.30
imperfections:
  control: {}
  intervention: {}
